<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f6efe6">
  <title>{% block title %}Stock Papi{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要內容</a>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主要導覽">
      <a class="brand" href="{{ url_for('dashboard_page') }}"><span class="brand-mark">SP</span><span>Stock Papi</span></a>
      <nav class="nav-list">
        <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="{{ url_for('dashboard_page') }}">市場首頁</a>
        <a class="nav-link" href="{{ url_for('market_page') }}">大盤分析</a>
      </nav>
      <p class="sidebar-note">資料僅供研究參考，不構成投資建議。</p>
    </aside>
    <main class="main-content" id="main-content" tabindex="-1">{% block content %}{% endblock %}</main>
  </div>
  <nav class="mobile-nav" aria-label="行動版導覽">
    <a href="{{ url_for('dashboard_page') }}">市場首頁</a>
    <a href="{{ url_for('market_page') }}">大盤分析</a>
  </nav>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
